backend:
  name: github
  repo: mango-stop/mango-stop.github.io
  branch: main
  base_url: https://sveltia-cms-auth.msj121702.workers.dev

media_folder: public/uploads
public_folder: /uploads

site_url: https://mango-stop.github.io

collections:
  - name: pages
    label: 페이지
    files:
      - name: home
        label: 홈 화면
        file: src/content/home/home.md
        fields:
          - { name: title, label: 메인 제목, widget: string }
          - { name: tagline, label: 소개 문구, widget: string }

      - name: about
        label: About (소개)
        file: src/content/about/about.md
        fields:
          - { name: name, label: 이름, widget: string, required: false, hint: '비워두면 표시되지 않습니다' }
          - { name: role, label: 직함/학년, widget: string }
          - { name: affiliation, label: 소속, widget: string }
          - { name: email, label: 이메일, widget: string }
          - { name: github, label: GitHub 아이디, widget: string }
          - { name: body, label: 소개글, widget: markdown }

  - name: posts
    label: 게시물
    folder: src/content/posts
    create: true
    slug: '{{slug}}'
    extension: md
    format: frontmatter
    sortable_fields: [pubDate, title]
    view_filters:
      - label: 일기
        field: category
        pattern: diary
      - label: 논문 리뷰
        field: category
        pattern: paper-review
      - label: 프로젝트
        field: category
        pattern: project
    fields:
      - { name: title, label: 제목, widget: string }
      - { name: description, label: 요약, widget: string }
      - { name: pubDate, label: 작성일, widget: datetime, format: 'YYYY-MM-DD', time_format: false }
      - name: category
        label: 카테고리
        widget: select
        options:
          - { label: 일기, value: diary }
          - { label: 논문 리뷰, value: paper-review }
          - { label: 프로젝트, value: project }
        default: diary
      - { name: tags, label: 태그, widget: list, default: [], required: false }
      - { name: cover, label: 대표 이미지, widget: image, required: false, hint: '비워두면 본문의 첫 번째 이미지가 자동으로 사용됩니다' }
      - { name: draft, label: 임시글, widget: boolean, default: false, required: false }
      - { name: body, label: 본문, widget: markdown }
